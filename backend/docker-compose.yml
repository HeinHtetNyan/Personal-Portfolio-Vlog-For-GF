version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: july
      POSTGRES_PASSWORD: july_password
      POSTGRES_DB: july_portfolio
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U july -d july_portfolio"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://july:july_password@postgres:5432/july_portfolio
    volumes:
      - ./uploads:/app/uploads
      - ./app:/app/app
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
